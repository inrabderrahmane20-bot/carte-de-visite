<script>
// Language switcher (simple, default to English/French)
document.addEventListener('DOMContentLoaded', function() {
  const userLang = navigator.language || navigator.userLanguage;
  let lang = 'en';
  if (userLang.startsWith('fr')) lang = 'fr';
  // Add more languages if needed
  // Example: switch HUD labels (minimal demo)
  if (lang === 'fr') {
    document.title = 'Carte de visite — Ingénieur en développement logiciel';
    const hud = document.getElementById('hud-tl');
    if (hud) {
      const label = hud.querySelector('.hud-label');
      if (label) label.textContent = '// ingénieur';
      const val = hud.querySelector('.hud-val');
      if (val) val.textContent = 'ABDERRAHMANE CHARAK';
      const dim = hud.querySelector('.hud-dim');
      if (dim) dim.textContent = 'développeur.logiciel';
    }
  }
});
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap');

/* ══════════════════════════════════════════════════════
   RESET & ROOT
══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:   #04071a;
  --deep:   #060b24;
  --mid:    #0a1232;
  --accent: #2a7cff;
  --cyan:   #00d4ff;
  --green:  #00ff8c;
  --silver: #a8bcd4;
  --dim:    rgba(168,188,212,0.18);
  --card-w: min(88vw, 680px);
  --card-h: calc(var(--card-w) * 0.5625);
  --radius: calc(var(--card-w) * 0.022);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--navy);
  font-family: 'JetBrains Mono', monospace;
  -webkit-font-smoothing: antialiased;
  cursor: crosshair;
}

/* ══════════════════════════════════════════════════════
   LAYER STACK (back → front)
   1. grid       – subtle perspective grid
   2. matrix     – code rain canvas
   3. floaters   – drifting keywords canvas
   4. circuit    – SVG circuit traces
   5. glows      – radial glow blobs
   6. scene      – the 3D card
   7. hud        – corner overlays
══════════════════════════════════════════════════════ */

/* ── 1. Perspective Grid ─────────────────────────── */
#grid-layer {
  position: fixed; inset: 0; z-index: 1;
  background:
    linear-gradient(rgba(42,124,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(42,124,255,0.035) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 30%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 30%, transparent 75%);
}

/* ── 2. Matrix canvas ───────────────────────────── */
#matrix-canvas { position: fixed; inset: 0; z-index: 2; opacity: 0.18; }

/* ── 3. Floating keywords canvas ────────────────── */
#float-canvas { position: fixed; inset: 0; z-index: 3; pointer-events: none; }

/* ── 4. Circuit SVG ─────────────────────────────── */
#circuit-layer {
  position: fixed; inset: 0; z-index: 4;
  pointer-events: none;
  opacity: 0.22;
}

/* ── 5. Glow blobs ──────────────────────────────── */
#glow-layer {
  position: fixed; inset: 0; z-index: 5; pointer-events: none;
  background:
    radial-gradient(ellipse 50% 40% at 15% 70%, rgba(0,212,255,0.055) 0%, transparent 65%),
    radial-gradient(ellipse 45% 35% at 88% 20%, rgba(42,124,255,0.065) 0%, transparent 60%),
    radial-gradient(ellipse 35% 30% at 50% 50%, rgba(0,255,140,0.025) 0%, transparent 55%);
}

/* grain noise */
#glow-layer::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 150px;
  opacity: 0.6;
}

/* ══════════════════════════════════════════════════════
   HUD OVERLAYS (corners)
══════════════════════════════════════════════════════ */
.hud {
  position: fixed; z-index: 20;
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(9px, 1.1vw, 11px);
  font-weight: 300;
  color: rgba(0,212,255,0.45);
  pointer-events: none;
  line-height: 1.7;
  letter-spacing: 0.04em;
}

#hud-tl { top: 22px; left: 24px; }
#hud-tr { top: 22px; right: 24px; text-align: right; }
#hud-bl { bottom: 22px; left: 24px; }
#hud-br { bottom: 22px; right: 24px; text-align: right; }

.hud-label   { color: rgba(42,124,255,0.55); font-size: 0.85em; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 2px; }
.hud-val     { color: rgba(0,212,255,0.55); }
.hud-green   { color: rgba(0,255,140,0.5); }
.hud-dim     { color: rgba(168,188,212,0.2); font-size: 0.82em; }

/* Corner bracket decorations */
#hud-tl::before,#hud-tr::before,#hud-bl::after,#hud-br::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-color: rgba(42,124,255,0.35);
  border-style: solid;
}
#hud-tl::before { top:-6px; left:-6px; border-width: 1.5px 0 0 1.5px; }
#hud-tr::before { top:-6px; right:-6px; border-width: 1.5px 1.5px 0 0; }
#hud-bl::after  { bottom:-6px; left:-6px; border-width: 0 0 1.5px 1.5px; }
#hud-br::after  { bottom:-6px; right:-6px; border-width: 0 1.5px 1.5px 0; }

/* Scanline sweep */
#scanline {
  position: fixed; inset: 0; z-index: 6; pointer-events: none;
  background: linear-gradient(to bottom,
    transparent 0%,
    rgba(0,212,255,0.012) 50%,
    transparent 100%);
  background-size: 100% 6px;
  animation: scanSweep 8s linear infinite;
  opacity: 0.5;
}
@keyframes scanSweep {
  from { background-position: 0 -100vh; }
  to   { background-position: 0 100vh; }
}

/* ══════════════════════════════════════════════════════
   SCENE & CARD
══════════════════════════════════════════════════════ */
#scene-wrap {
  position: fixed; inset: 0; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}

  .scene {
    position: relative;
    perspective: 1900px;
    perspective-origin: 50% 46%;
    width: var(--card-w);
    height: var(--card-h);
    pointer-events: all;
    user-select: none;
    -webkit-user-select: none;
  }

.card-wrapper {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d;
  will-change: transform;
  cursor: grab;
  transform: rotateY(0deg);
}
.card-wrapper.dragging { cursor: grabbing; }

/* Card faces */
.card-face {
  position: absolute; inset: 0;
  border-radius: var(--radius);
  overflow: hidden;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  outline: 1px solid rgba(255,255,255,0.07);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.13),
    inset 0 -1px 0 rgba(0,0,0,0.35),
    0 0 0 1px rgba(42,124,255,0.08);
}
.card-face--front { transform: translateZ(6px); }
.card-face--back  { transform: rotateY(180deg) translateZ(6px); }

.card-face img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  display: block;
  pointer-events: none;
  -webkit-user-drag: none;
}

.img-placeholder {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #0b1540 0%, #060b24 100%);
  display: flex; align-items: center; justify-content: center;
  color: rgba(42,124,255,0.25);
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(10px, 1.3vw, 12px);
  letter-spacing: 0.2em;
  transition: opacity 0.6s ease;
}
.img-placeholder.loaded { opacity: 0; pointer-events: none; }

/* Specular gloss */
.gloss {
  position: absolute; inset: 0;
  border-radius: var(--radius);
  pointer-events: none;
}

/* Card edges */
.card-edge { position: absolute; inset: 0; transform-style: preserve-3d; }
.edge-strip {
  position: absolute;
  background: linear-gradient(to bottom,
    rgba(100,130,200,0.0) 0%,
    rgba(168,188,212,0.3) 30%,
    rgba(200,220,255,0.4) 50%,
    rgba(168,188,212,0.3) 70%,
    rgba(100,130,200,0.0) 100%);
}
.edge-top    { top: 0; left: calc(var(--radius)); right: calc(var(--radius)); height: 4px; transform: rotateX(90deg) translateZ(3px); }
.edge-bottom { bottom: 0; left: calc(var(--radius)); right: calc(var(--radius)); height: 4px; transform: rotateX(-90deg) translateZ(3px); }

/* Shadow */
.card-shadow {
  position: absolute;
  bottom: calc(-1 * var(--card-h) * 0.1);
  left: 50%;
  width: calc(var(--card-w) * 0.8);
  height: calc(var(--card-h) * 0.18);
  background: radial-gradient(ellipse at 50% 25%, rgba(0,8,45,0.85) 0%, transparent 70%);
  filter: blur(28px);
  border-radius: 50%;
  pointer-events: none;
  z-index: -1;
}

/* Rotation indicator arc */
#rot-indicator {
  position: absolute;
  bottom: calc(-1 * var(--card-h) * 0.22);
  left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 3px;
  background: rgba(42,124,255,0.15);
  border-radius: 2px;
  overflow: hidden;
}
#rot-fill {
  height: 100%;
  background: linear-gradient(to right, var(--accent), var(--cyan));
  border-radius: 2px;
  width: 50%;
  transition: none;
  box-shadow: 0 0 8px rgba(0,212,255,0.6);
}
#rot-label {
  position: absolute;
  bottom: calc(-1 * var(--card-h) * 0.32);
  left: 50%;
  transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(9px,1vw,11px);
  color: rgba(0,212,255,0.4);
  letter-spacing: 0.15em;
  white-space: nowrap;
  pointer-events: none;
}

/* Contact link overlays on back face */
.card-link {
  position: absolute;
  display: block;
  pointer-events: all;
  cursor: pointer;
  border-radius: 5px;
  z-index: 4;
  transition: background 0.18s ease, box-shadow 0.18s ease;
  -webkit-tap-highlight-color: transparent;
}
.card-link:hover,
.card-link:active {
  background: rgba(0,212,255,0.13);
  box-shadow: inset 0 0 0 1px rgba(0,212,255,0.30);
}

/* Edge matrix side-face canvases — live inside card-wrapper in 3D space */
#emL, #emR {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  /* width / height / transform set via JS once card dimensions are known */
}

/* Hint */
#hint {
  position: fixed;
  bottom: 5.5vh; left: 50%;
  transform: translateX(-50%);

<script>
/* ═══════════════════════════════════════════════════════
   BACKGROUND SYSTEM 1 — MATRIX RAIN
═══════════════════════════════════════════════════════ */
// Easter egg: WhatsApp contact after spinning too much
let spinCount = 0;
let lastSpinRot = 0;
let easterEggTriggered = false;
let countdownActive = false;
let countdownOverlay = null;
let countdownTimeout = null;

(function() {
  const canvas = document.getElementById('matrix-canvas');
  const ctx    = canvas.getContext('2d');

  // Mix of code characters: hex, binary, symbols, Latin letters
  const CHARS = '01アイウエオカキクケコ{}[]()<>=!@#$%^&*+-/\\|;:ABCDEFabcdef0123456789';

  let cols, drops, speeds, alphas;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    cols   = Math.floor(canvas.width / 18);
    drops  = Array.from({ length: cols }, () => Math.random() * -canvas.height / 18);
    speeds = Array.from({ length: cols }, () => 0.25 + Math.random() * 0.55);
    alphas = Array.from({ length: cols }, () => 0.25 + Math.random() * 0.55);
  }

  resize();
  window.addEventListener('resize', resize);

  function draw() {
    ctx.fillStyle = 'rgba(4,7,26,0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < cols; i++) {
      const char = CHARS[Math.floor(Math.random() * CHARS.length)];
      const x    = i * 18;
      const y    = drops[i] * 18;

      // Head glyph: bright cyan/green
      ctx.font        = `${11 + Math.random() * 3}px 'JetBrains Mono', monospace`;
      ctx.fillStyle   = `rgba(0,255,180,${alphas[i]})`;
      ctx.fillText(char, x, y);

      // Trail glyphs: dim blue
      const trail = CHARS[Math.floor(Math.random() * CHARS.length)];
      ctx.fillStyle = `rgba(42,100,255,${alphas[i] * 0.35})`;
      ctx.fillText(trail, x, y - 18);

      drops[i] += speeds[i];
      if (drops[i] * 18 > canvas.height && Math.random() > 0.975) {
        drops[i] = -2;
        speeds[i] = 0.2 + Math.random() * 0.6;
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ═══════════════════════════════════════════════════════
   BACKGROUND SYSTEM 2 — FLOATING CODE KEYWORDS
═══════════════════════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('float-canvas');
  const ctx    = canvas.getContext('2d');

  const KEYWORDS = [
    'const',    'async',       'await',      'import',    'export',
    'function', 'return',      'class',      'extends',   'interface',
    'typeof',   'void',        'null',       'undefined', 'Promise',
    'fetch()',  '.then()',     '.catch()',   'useState',  'useEffect',
    'for(;;)',  'while(true)', 'git push',  'git commit','npm install',
    '// TODO',  '/* fix */',   'try{}',     'catch(e)',  'throw e',
    'O(log n)', 'O(n²)',       'REST',       'GraphQL',   'WebSocket',
    '200 OK',   '404',         '500',        'Bearer',    'JWT',
    'docker',   'k8s',         'nginx',      'ssh',       'curl',
    '.env',     'README.md',  '.gitignore', 'package.json','tsconfig',
  ];

  let W, H;
  let particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function spawn() {
    const side = Math.random() < 0.5 ? 0 : 1; // left or right edge mostly
    return {
      text  : KEYWORDS[Math.floor(Math.random() * KEYWORDS.length)],
      x     : side ? Math.random() * W * 0.35 : W * 0.65 + Math.random() * W * 0.35,
      y     : H + 20,
      vx    : (Math.random() - 0.5) * 0.18,
      vy    : -(0.18 + Math.random() * 0.32),
      alpha : 0,
      maxAlpha: 0.08 + Math.random() * 0.16,
      size  : 9 + Math.floor(Math.random() * 5),
      color : Math.random() < 0.4 ? '#2a7cff' : Math.random() < 0.6 ? '#00d4ff' : '#00ff8c',
      life  : 0,
      maxLife: 220 + Math.random() * 180,
    };
  }

  for (let i = 0; i < 28; i++) {
    const p = spawn();
    p.y     = Math.random() * H;
    p.life  = Math.random() * p.maxLife;
    p.alpha = p.maxAlpha;
    particles.push(p);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.font = 'lighter 11px "JetBrains Mono",monospace';

    // Spawn new particles occasionally
    if (Math.random() < 0.04 && particles.length < 40) particles.push(spawn());

    particles = particles.filter(p => p.life < p.maxLife + 30);

    for (const p of particles) {
      p.life++;
      p.x += p.vx; p.y += p.vy;
      // fade in / fade out
      if (p.life < 30)           p.alpha = (p.life / 30) * p.maxAlpha;
      else if (p.life > p.maxLife - 40) p.alpha = Math.max(0, p.alpha - p.maxAlpha / 40);

      ctx.globalAlpha = p.alpha;
      ctx.fillStyle   = p.color;
      ctx.font        = `300 ${p.size}px 'JetBrains Mono',monospace`;
      ctx.fillText(p.text, p.x, p.y);
      ctx.globalAlpha = 1;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ═══════════════════════════════════════════════════════
   BACKGROUND SYSTEM 3 — SVG CIRCUIT TRACES
═══════════════════════════════════════════════════════ */
(function() {
  const svg = document.getElementById('circuit-layer');
  const ns  = 'http://www.w3.org/2000/svg';
  const W   = window.innerWidth;
  const H   = window.innerHeight;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const COLORS = ['#1a3a8f','#0d2a7a','#0a2070','#1244aa'];

  // Generate random circuit-like paths
  function makeTrace(startX, startY) {
    const segs = 3 + Math.floor(Math.random() * 5);
    let   d    = `M${startX} ${startY}`;
    let   cx   = startX, cy = startY;

    for (let i = 0; i < segs; i++) {
      const horiz = Math.random() < 0.55;
      const len   = 40 + Math.random() * 140;
      if (horiz) {
        const nx = cx + (Math.random() < 0.5 ? len : -len);
        d += ` H${nx.toFixed(0)}`;
        cx = nx;
      } else {
        const ny = cy + (Math.random() < 0.5 ? len : -len);
        d += ` V${ny.toFixed(0)}`;
        cy = ny;
      }
      // Add a corner dot
      if (i < segs - 1) {
        const dot = document.createElementNS(ns, 'circle');
        dot.setAttribute('cx', cx); dot.setAttribute('cy', cy); dot.setAttribute('r', '2');
        dot.setAttribute('fill', COLORS[Math.floor(Math.random() * COLORS.length)]);
        svg.appendChild(dot);
      }
    }

    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', d);
    path.setAttribute('stroke', COLORS[Math.floor(Math.random() * COLORS.length)]);
    path.setAttribute('stroke-width', Math.random() < 0.3 ? '1.5' : '1');
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke-dasharray', `${20 + Math.random()*40} ${10 + Math.random()*20}`);
    // Animate dashoffset for a "signal travelling" effect
    const len2 = path.getTotalLength ? 0 : 300;
    path.setAttribute('stroke-dashoffset', '0');
    svg.appendChild(path);

    // Animate with a <animateTransform>
    const anim = document.createElementNS(ns, 'animate');
    anim.setAttribute('attributeName', 'stroke-dashoffset');
    anim.setAttribute('from', '100');
    anim.setAttribute('to', '0');
    anim.setAttribute('dur', `${3 + Math.random() * 7}s`);
    anim.setAttribute('repeatCount', 'indefinite');
    path.appendChild(anim);
  }

  // Generate traces clustered on the edges, away from center card
  for (let i = 0; i < 22; i++) {
    const zone = Math.random();
    let sx, sy;
    if (zone < 0.25)      { sx = Math.random() * W * 0.25;               sy = Math.random() * H; }
    else if (zone < 0.5)  { sx = W * 0.75 + Math.random() * W * 0.25;   sy = Math.random() * H; }
    else if (zone < 0.75) { sx = Math.random() * W;                       sy = Math.random() * H * 0.22; }
    else                  { sx = Math.random() * W;                       sy = H * 0.78 + Math.random() * H * 0.22; }
    makeTrace(sx, sy);
  }

  // Blinking LED dots
  const ledPositions = Array.from({ length: 14 }, () => ({
    x: Math.random() * W, y: Math.random() * H
  }));
  for (const pos of ledPositions) {
    const circle = document.createElementNS(ns, 'circle');
    circle.setAttribute('cx', pos.x); circle.setAttribute('cy', pos.y); circle.setAttribute('r', '2.5');
    circle.setAttribute('fill', Math.random() < 0.5 ? '#2a7cff' : '#00ff8c');
    const anim2 = document.createElementNS(ns, 'animate');
    anim2.setAttribute('attributeName', 'opacity');
    anim2.setAttribute('values', '0.1;0.8;0.1');
    anim2.setAttribute('dur', `${1.5 + Math.random() * 4}s`);
    anim2.setAttribute('repeatCount', 'indefinite');
    circle.appendChild(anim2);
    svg.appendChild(circle);
  }
})();

function loadDriveImage(imgEl, placeholderEl, fileId) {
  function tryUrl(url) {
    return new Promise((res, rej) => {
      const img = new Image();
      img.onload  = () => res(url);
      img.onerror = rej;
      img.src     = url;
    });
  }
  const urls = [
    `https://lh3.googleusercontent.com/d/${fileId}`,
    `https://drive.google.com/thumbnail?id=${fileId}&sz=w1200`,
  ];
  (async () => {
    for (const url of urls) {
      try {
        await tryUrl(url);
        imgEl.src = url;
        imgEl.onload = () => placeholderEl.classList.add('loaded');
        return;
      } catch {}
    }
    placeholderEl.textContent = '— place image here —';
  })();
}

/* ═══════════════════════════════════════════════════════
   CARD ROTATION ENGINE
   — Free rotation, no snapping
   — Inertia / momentum with damping
   — Full 360° unlimited spin
═══════════════════════════════════════════════════════ */
(function() {
  const wrapper   = document.getElementById('cardWrapper');
  const shadow    = document.getElementById('cardShadow');
  const glossF    = document.getElementById('glossFront');
  const glossB    = document.getElementById('glossBack');
  const rotFill   = document.getElementById('rot-fill');
  // const rotLabel  = document.getElementById('rot-label');
  const hudRot    = document.getElementById('hud-rot-disp');
  const hudFace   = document.getElementById('hud-face');
  const hudVel    = document.getElementById('hud-vel');

  /* ── State ── */
  let rot        = 0;       // current Y rotation (degrees, unbounded)
  let velocity   = 0;       // degrees per frame, for inertia
  let dragging   = false;
  let lastX      = 0;
  let lastDeltaX = 0;       // for velocity calculation
  let hintGone   = false;

  // Entrance animation state
  let introActive = true;
  let introStart  = null;
  let introRot0   = -540; // Start at -540deg (1.5 spins)
  let introRot1   = 0;    // End at 0deg
  let introScale0 = 0.55; // Start small
  let introScale1 = 1;    // End at normal scale
  let introDur    = 1800; // ms

  // Responsive: adjust for mobile/desktop
  function getTargetRot() {
    // End at a nice angle (e.g., 0deg or 12deg)
    return window.innerWidth < 600 ? 0 : -12;
  }

  const SENSITIVITY   = 0.52;   // deg / px
  const INERTIA_DAMP  = 0.935;  // friction (per frame), 0=instant stop, 1=no friction
  const MIN_VELOCITY  = 0.04;   // stop threshold

  /* ── Render ── */
  function render(scaleOverride) {
    let scale = typeof scaleOverride === 'number' ? scaleOverride : 1;
    if (wrapper) wrapper.style.transform = `rotateY(${rot}deg) scale(${scale})`;
    // Easter egg: count spins
    if (!easterEggTriggered && !countdownActive) {
      let diff = Math.abs(rot - lastSpinRot);
      if (diff > 360) {
        spinCount += Math.floor(diff / 360);
        lastSpinRot = rot;
      }
      if (spinCount >= 12) { // 12 full spins
        triggerEasterEgg();
      }
    }
  // Easter egg logic
  function triggerEasterEgg() {
    easterEggTriggered = true;
    countdownActive = true;
    let count = 10;
    let speeds = Array.from({length: 10}, () => 300 + Math.random() * 900);
    countdownOverlay = document.createElement('div');
    countdownOverlay.style.position = 'fixed';
    countdownOverlay.style.inset = '0';
    countdownOverlay.style.background = 'rgba(4,7,26,0.92)';
    countdownOverlay.style.display = 'flex';
    countdownOverlay.style.flexDirection = 'column';
    countdownOverlay.style.alignItems = 'center';
    countdownOverlay.style.justifyContent = 'center';
    countdownOverlay.style.zIndex = '9999';
    countdownOverlay.style.fontFamily = "'JetBrains Mono', monospace";
    countdownOverlay.innerHTML = '<div id="egg-countdown" style="font-size:clamp(48px,10vw,120px);color:#2a7cff;font-weight:700;margin-bottom:24px;"></div>' +
      '<div style="font-size:clamp(18px,3vw,32px);color:#a8bcd4;margin-bottom:18px;">You spun the card too much!</div>' +
      '<div style="font-size:clamp(14px,2vw,22px);color:#00ff8c;">Get ready for a surprise…</div>';
    document.body.appendChild(countdownOverlay);
    doCountdown(count, speeds);
  }

  function doCountdown(n, speeds) {
    const cd = document.getElementById('egg-countdown');
    if (!cd) return;
    cd.textContent = n;
    if (n > 0) {
      countdownTimeout = setTimeout(() => doCountdown(n-1, speeds), speeds[10-n]);
    } else {
      setTimeout(showFinalMessage, 600);
    }
  }

  function showFinalMessage() {
    if (countdownOverlay) {
      countdownOverlay.innerHTML = '<div style="font-size:clamp(32px,6vw,60px);color:#00ff8c;font-weight:700;margin-bottom:24px;">Time to create your future website!</div>' +
        '<div style="font-size:clamp(16px,2vw,28px);color:#a8bcd4;margin-bottom:18px;">You are now obliged to reach me 😁</div>' +
        '<button id="egg-whatsapp" style="padding:18px 38px;font-size:clamp(18px,3vw,28px);background:#2a7cff;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:600;box-shadow:0 4px 24px #2a7cff44;">Contact on WhatsApp</button>';
      const btn = document.getElementById('egg-whatsapp');
      if (btn) {
        btn.onclick = function() {
          window.location.href = 'https://wa.me/212711374861?text=' + encodeURIComponent("Hello, I'm reaching you from your carte de visite to create my very first professional website!");
        };
      }
    }
  }

    /* normalised 0–1 within current 180° cycle, for gloss/shadow */
    const phase  = ((rot % 360) + 360) % 360;          // 0–360
    const cycle  = phase < 180 ? phase / 180 : (360 - phase) / 180; // 0→1→0
    const edge   = 1 - Math.abs(cycle - 0.5) * 2;      // peak at 90° / 270°

    /* Which face is showing? */
    const norm360 = ((rot % 360) + 360) % 360;
    const showingFront = norm360 < 90 || norm360 >= 270;
    if (hudFace) hudFace.textContent = `face: ${showingFront ? 'front' : 'back'}`;

    /* Gloss */
    const gPos   = 15 + cycle * 70;
    const gAlpha = (0.02 + edge * 0.10).toFixed(3);
    const gAngle = 80 + (cycle - 0.5) * 45;
    if (glossF) glossF.style.background = `linear-gradient(${gAngle}deg,
      transparent ${Math.max(gPos-28,0)}%,
      rgba(255,255,255,${gAlpha}) ${gPos}%,
      transparent ${Math.min(gPos+28,100)}%)`;
    if (glossB) glossB.style.background = `linear-gradient(${180+gAngle}deg,
      transparent ${Math.max((100-gPos)-28,0)}%,
      rgba(255,255,255,${gAlpha}) ${100-gPos}%,
      transparent ${Math.min((100-gPos)+28,100)}%)`;

    /* Shadow: compresses when edge-on */
    if (shadow) {
      shadow.style.opacity   = 0.8  - edge * 0.3;
      shadow.style.transform = `translateX(-50%) scaleX(${1 - edge * 0.3})`;
    }

    /* Rotation indicator bar (maps current face 0–180 within its half) */
    const barPct = showingFront
      ? ((norm360 < 90 ? norm360 : 360 - norm360) / 90) * 100
      : (Math.abs(norm360 - 180) / 90) * 100;
    if (rotFill) rotFill.style.width = `${barPct}%`;

    /* HUD telemetry */
    if (hudRot) hudRot.textContent = `rotY: ${rot.toFixed(2)}°`;
    if (hudVel) hudVel.textContent = `vel: ${Math.abs(velocity).toFixed(2)}`;
  }

  /* ── Animation loop ── */
  function loop(ts) {
    if (introActive) {
      if (!introStart) introStart = ts;
      let t = Math.min(1, (ts - introStart) / introDur);
      // Ease out cubic
      t = 1 - Math.pow(1 - t, 3);
      rot = introRot0 + (getTargetRot() - introRot0) * t;
      let scale = introScale0 + (introScale1 - introScale0) * t;
      render(scale);
      if (t >= 1) {
        introActive = false;
        rot = getTargetRot();
        render(1);
      } else {
        requestAnimationFrame(loop);
        return;
      }
    } else if (!dragging) {
      /* Apply inertia */
      if (Math.abs(velocity) > MIN_VELOCITY) {
        rot      += velocity;
        velocity *= INERTIA_DAMP;
      } else {
        velocity = 0;
      }
    }
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // On resize, update target angle for intro if not started
  window.addEventListener('resize', () => {
    if (introActive && !introStart) {
      rot = introRot0;
      render(introScale0);
    }
  });

  /* ── Drag start ── */
  function onStart(x) {
    dragging    = true;
    lastX       = x;
    lastDeltaX  = 0;
    velocity    = 0;
    if (wrapper) wrapper.classList.add('dragging');
    // hint removed
  }

  /* ── Drag move ── */
  function onMove(x) {
    if (!dragging || countdownActive) return;
    const dx  = x - lastX;
    lastDeltaX = dx;
    rot += dx * SENSITIVITY;   // drag left = rotate left (reveal left)
    lastX = x;
  }

  /* ── Drag end — release with captured velocity ── */
  function onEnd() {
    if (!dragging || countdownActive) return;
    dragging  = false;
    if (wrapper) wrapper.classList.remove('dragging');
    /* Transfer last drag delta into inertia velocity */
    velocity = lastDeltaX * SENSITIVITY;
  }

  /* Mouse */
  wrapper.addEventListener('mousedown',  e => { if (e.target.closest('a')) return; e.preventDefault(); onStart(e.clientX); });
  document.addEventListener('mousemove', e => onMove(e.clientX));
  document.addEventListener('mouseup',   () => onEnd());
  document.addEventListener('mouseleave',() => dragging && onEnd());

  /* Touch */
  wrapper.addEventListener('touchstart',  e => { if (e.target.closest('a')) return; e.preventDefault(); onStart(e.touches[0].clientX); }, { passive: false });
  document.addEventListener('touchmove',  e => { if (dragging) { e.preventDefault(); onMove(e.touches[0].clientX); } }, { passive: false });
  document.addEventListener('touchend',   () => onEnd());
  document.addEventListener('touchcancel',() => onEnd());

  /* Keyboard: A/D or ←/→ arrows to spin */
  wrapper.setAttribute('tabindex','0');
  wrapper.setAttribute('role','button');
  wrapper.setAttribute('aria-label','Business card — drag or use arrow keys to rotate');
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft'  || e.key === 'a') velocity -= 3;
    if (e.key === 'ArrowRight' || e.key === 'd') velocity += 3;
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      // Gentle flick
      velocity = velocity > 0 ? -8 : 8;
    }
    // if (!hintGone) { hintGone = true; hint.classList.add('gone'); }
  });
})();

/* ═══════════════════════════════════════════════════════
   EDGE MATRIX RAIN
   emL — left side face,  visible when card is at ~90°
   emR — right side face, visible when card is at ~270°
   Both are 3D panels inside card-wrapper, 12 px wide,
   full card height, positioned via rotateY + translateZ.
═══════════════════════════════════════════════════════ */
(function() {
  const THICKNESS = 12;   // matches card translateZ(6px) × 2
  const CHAR_H    = 8;    // px per character row
  const CHARS     = '01アイウエオカキクケコ01010101'.split('');

  const wrapper = document.getElementById('cardWrapper');
  const emL = document.getElementById('emL');
  const emR = document.getElementById('emR');
  const ctxL = emL.getContext('2d');
  const ctxR = emR.getContext('2d');

  let H, cols, dropsL, dropsR, speedsL, speedsR;

  function init() {
    const cardW = wrapper.offsetWidth;
    H = wrapper.offsetHeight;

    /* Size: THICKNESS wide, full card height */
    emL.width  = emR.width  = THICKNESS;
    emL.height = emR.height = H;

    /* 3D placement — standard CSS cube side-face formula:
       rotateY(±90deg) translateZ(cardWidth/2)
       Left face  (rotateY(-90deg)) → faces viewer at wrapper 90°
       Right face (rotateY( 90deg)) → faces viewer at wrapper 270°  */
    emL.style.transform = `rotateY(-90deg) translateZ(${cardW / 2}px)`;
    emR.style.transform = `rotateY(90deg)  translateZ(${cardW / 2}px)`;

    cols   = Math.max(1, Math.floor(THICKNESS / CHAR_H));
    dropsL = Array.from({ length: cols }, () => Math.random() * -(H / CHAR_H));
    dropsR = Array.from({ length: cols }, () => Math.random() * -(H / CHAR_H));
    speedsL = Array.from({ length: cols }, () => 0.7 + Math.random() * 0.8);
    speedsR = Array.from({ length: cols }, () => 0.7 + Math.random() * 0.8);
  }

  init();
  window.addEventListener('resize', init);

  function drawFace(ctx, drops, speeds) {
    ctx.fillStyle = 'rgba(0,0,0,0.20)';
    ctx.fillRect(0, 0, THICKNESS, H);

    for (let i = 0; i < cols; i++) {
      const x = i * CHAR_H;
      const y = drops[i] * CHAR_H;
      const ch = CHARS[Math.floor(Math.random() * CHARS.length)];

      ctx.font      = `bold ${CHAR_H - 1}px "JetBrains Mono",monospace`;
      ctx.fillStyle = `rgba(0,255,65,${0.9 + Math.random() * 0.1})`;
      ctx.fillText(ch, x, y);

      ctx.fillStyle = 'rgba(0,180,40,0.5)';
      ctx.fillText(CHARS[Math.floor(Math.random() * CHARS.length)], x, y - CHAR_H);

      drops[i] += speeds[i];
      if (drops[i] * CHAR_H > H && Math.random() > 0.97) {
        drops[i] = -2;
        speeds[i] = 0.6 + Math.random() * 0.9;
      }
    }
  }

  function draw() {
    drawFace(ctxL, dropsL, speedsL);
    drawFace(ctxR, dropsR, speedsR);
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
